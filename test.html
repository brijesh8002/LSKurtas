<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>

<style>
  .pd-secure {
  text-align: center;
  padding: 20px 15px;
  font-family: Arial, sans-serif;
}

/* Title */
.pd-secure-title {
  font-size: 18px;
  font-weight: 600;
  color: #555;
  margin-bottom: 15px;
}

/* Payment Box */
.pd-payment-box {
  border: 1px solid #ddd;
  border-radius: 12px;
  padding: 15px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  background: #fafafa;
}

/* Logos */
.pd-payment-box img {
  height: 22px;
  object-fit: contain;
}

/* Features Row */
.pd-features {
  display: flex;
  justify-content: space-around;
  margin-top: 25px;
}

/* Each Feature */
.pd-feature {
  text-align: center;
}

/* Icons */
.pd-feature i {
  font-size: 30px;
  color: #222;
}

/* Text */
.pd-feature p {
  font-size: 14px;
  margin-top: 8px;
  color: #333;
  line-height: 1.3;
}
</style>
<body>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<div class="pd-secure">

  <!-- Heading -->
  <h3 class="pd-secure-title">
    Guarantee safe & secure checkout
  </h3>

  <!-- Payment Box -->
  <div class="pd-payment-box">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/5f/Google_Pay_Logo.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/8/89/Razorpay_logo.svg">
    <img src="https://upload.wikimedia.org/wikipedia/commons/b/b5/Paytm_logo.png">
    <img src="https://upload.wikimedia.org/wikipedia/commons/1/1b/UPI-Logo-vector.svg">
  </div>

  <!-- Features -->
  <div class="pd-features">

    <div class="pd-feature">
      <i class="bi bi-truck"></i>
      <p>Fast<br>Shipping</p>
    </div>

    <div class="pd-feature">
      <i class="bi bi-arrow-return-left"></i>
      <p>7 Day<br>Exchange<br>Policy</p>
    </div>

    <div class="pd-feature">
      <i class="bi bi-heart"></i>
      <p>Best<br>Quality</p>
    </div>

  </div>

</div>
</body>
</html>
